<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nous Dashboard v2</title>
  <link rel="stylesheet" href="style.css?v=20260525c">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#8710;</text></svg>">
</head>
<body>

  <!-- ========== Header ========== -->
  <header class="dashboard-header">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      <h1>Nous Dashboard v2</h1>
      <span class="version-badge">alpha</span>
    </div>
    <div class="header-right">
      <div class="refresh-status">
        <span class="refresh-dot" id="refresh-dot"></span>
        <span>Auto-refresh</span>
      </div>
      <span class="last-updated" id="last-updated">—</span>
    </div>
  </header>

  <!-- ========== Dashboard Grid ========== -->
  <div class="dashboard-grid">

    <!-- M1: Agent Registry (Enhanced) -->
    <div class="card card-full">
      <div class="card-header">
        <h2>Agent Registry</h2>
        <span class="badge">heartbeat</span>
      </div>
      <div class="card-body" id="m1-body">
        <div class="loading-pulse"><span class="pulse-dot"></span><span class="pulse-dot"></span><span class="pulse-dot"></span><span style="margin-left:8px">Checking agents...</span></div>
      </div>
    </div>

    <!-- M6: Signal Timeline (new core module) -->
    <div class="card card-full">
      <div class="card-header">
        <h2>Signal Timeline</h2>
        <div class="card-header-right">
          <select id="signal-type-filter" class="filter-select" onchange="applySignalFilters()">
            <option value="">All Types</option>
            <option value="HEARTBEAT">HEARTBEAT</option>
            <option value="DONE">DONE</option>
            <option value="BLOCKED">BLOCKED</option>
            <option value="ASK:arch">ASK:arch</option>
            <option value="ASK:impl">ASK:impl</option>
            <option value="SYNC">SYNC</option>
            <option value="REPAIR">REPAIR</option>
            <option value="STATUS">STATUS</option>
          </select>
          <select id="signal-agent-filter" class="filter-select" onchange="applySignalFilters()">
            <option value="">All Agents</option>
            <option value="socrates">苏格拉底</option>
            <option value="aris">小亚</option>
            <option value="plato">柏拉图</option>
            <option value="grace">Grace</option>
          </select>
          <span class="badge" id="signal-count-badge">0 signals</span>
        </div>
      </div>
      <div class="card-body" id="m6-body">
        <div class="loading-pulse"><span class="pulse-dot"></span><span class="pulse-dot"></span><span class="pulse-dot"></span><span style="margin-left:8px">Loading signals...</span></div>
      </div>
    </div>

    <!-- M2: Task Lifecycle (left column) -->
    <div class="card">
      <div class="card-header">
        <h2>Task Lifecycle</h2>
        <span class="badge">kanban</span>
      </div>
      <div class="card-body" id="m2-body">
        <div class="loading-pulse"><span class="pulse-dot"></span><span class="pulse-dot"></span><span class="pulse-dot"></span><span style="margin-left:8px">Loading tasks...</span></div>
      </div>
    </div>

    <!-- Task Event Detail Panel (right column) -->
    <div class="card">
      <div class="card-header">
        <h2>Event Timeline</h2>
        <span class="badge" id="selected-task-label">select a task</span>
      </div>
      <div class="card-body" id="m2-events-body">
        <div class="event-empty">Click a task to see its lifecycle events</div>
      </div>
    </div>

  </div>

  <script src="app.js?v=20260525c"></script>
</body>
</html>
